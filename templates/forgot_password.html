<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワードをお忘れの方</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 100px auto; padding: 0 20px; }
        h1 { color: #333; text-align: center; font-size: 22px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #1976D2; }
        .link { text-align: center; margin-top: 15px; }
        .success { color: green; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>パスワードをお忘れの方</h1>
    <p style="text-align:center; color:#666;">登録したメールアドレスにリセットリンクを送ります。</p>
    <input type="email" id="email" placeholder="メールアドレス">
    <button onclick="sendReset()">リセットメールを送る</button>
    <div id="message" class="success"></div>
    <div class="link"><a href="/login">ログインに戻る</a></div>

    <script>
        async function sendReset() {
            const email = document.getElementById("email").value;
            const res = await fetch("/forgot-password", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({email})
            });
            const data = await res.json();
            document.getElementById("message").textContent = data.message;
        }
    </script>
</body>
</html>
