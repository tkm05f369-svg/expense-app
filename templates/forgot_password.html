<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワードリセット | Keihi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm px-6">
        <div class="mb-10">
            <h1 class="text-2xl font-bold text-white tracking-tight">Keihi</h1>
            <p class="text-zinc-500 text-sm mt-1">パスワードをリセットします</p>
        </div>
        <div class="bg-zinc-900 rounded-2xl p-7 border border-zinc-800">
            <h2 class="text-white font-semibold mb-2">パスワードをお忘れの方</h2>
            <p class="text-zinc-500 text-xs mb-5">登録したメールアドレスにリセットリンクを送ります</p>
            <input type="email" id="email" placeholder="メールアドレス" class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg px-4 py-2.5 mb-4 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-500 placeholder-zinc-500">
            <button onclick="sendReset()" class="w-full bg-white hover:bg-zinc-100 text-zinc-900 py-2.5 rounded-lg font-medium transition text-sm">リセットメールを送る</button>
            <div id="message" class="text-green-400 text-xs text-center mt-3"></div>
            <div class="border-t border-zinc-800 mt-5 pt-5 text-center text-xs text-zinc-500">
                <a href="/login" class="hover:text-white transition">ログインに戻る</a>
            </div>
        </div>
    </div>
    <script>
        async function sendReset() {
            const email = document.getElementById("email").value;
            const res = await fetch("/forgot-password", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({email})
            });
            const data = await res.json();
            document.getElementById("message").textContent = data.message;
        }
    </script>
</body>
</html>
