<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード変更 | Keihi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm px-6">
        <div class="mb-10">
            <h1 class="text-2xl font-bold text-white tracking-tight">Keihi</h1>
            <p class="text-zinc-500 text-sm mt-1">新しいパスワードを設定してください</p>
        </div>
        <div class="bg-zinc-900 rounded-2xl p-7 border border-zinc-800">
            <h2 class="text-white font-semibold mb-5">パスワードを変更</h2>
            <input type="password" id="password" placeholder="新しいパスワード" class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg px-4 py-2.5 mb-3 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-500 placeholder-zinc-500">
            <input type="password" id="confirm" placeholder="パスワード（確認）" class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg px-4 py-2.5 mb-4 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-500 placeholder-zinc-500">
            <button onclick="resetPassword()" class="w-full bg-white hover:bg-zinc-100 text-zinc-900 py-2.5 rounded-lg font-medium transition text-sm">パスワードを変更する</button>
            <div id="message" class="text-xs text-center mt-3"></div>
        </div>
    </div>
    <script>
        async function resetPassword() {
            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirm").value;
            const msg = document.getElementById("message");
            if (password !== confirm) {
                msg.className = "text-red-400 text-xs text-center mt-3";
                msg.textContent = "パスワードが一致しません";
                return;
            }
            const token = window.location.pathname.split("/").pop();
            const res = await fetch(`/reset-password/${token}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({password})
            });
            const data = await res.json();
            msg.className = "text-green-400 text-xs text-center mt-3";
            msg.textContent = data.message;
            setTimeout(() => window.location.href = "/login", 1500);
        }
    </script>
</body>
</html>
