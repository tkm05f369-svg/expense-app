<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワードリセット</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 100px auto; padding: 0 20px; }
        h1 { color: #333; text-align: center; font-size: 22px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #45a049; }
        .success { color: green; text-align: center; margin-top: 10px; }
        .error { color: red; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>パスワードリセット</h1>
    <input type="password" id="password" placeholder="新しいパスワード">
    <input type="password" id="confirm" placeholder="パスワード（確認）">
    <button onclick="resetPassword()">パスワードを変更する</button>
    <div id="message"></div>

    <script>
        async function resetPassword() {
            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirm").value;
            const msg = document.getElementById("message");
            if (password !== confirm) {
                msg.className = "error";
                msg.textContent = "パスワードが一致しません";
                return;
            }
            const token = window.location.pathname.split("/").pop();
            const res = await fetch(`/reset-password/${token}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({password})
            });
            const data = await res.json();
            msg.className = "success";
            msg.textContent = data.message;
            setTimeout(() => window.location.href = "/login", 1500);
        }
    </script>
</body>
</html>
