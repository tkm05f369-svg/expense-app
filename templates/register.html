<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント作成</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 100px auto; padding: 0 20px; }
        h1 { color: #333; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #1976D2; }
        .link { text-align: center; margin-top: 15px; }
        .error { color: red; text-align: center; }
        .success { color: green; text-align: center; }
    </style>
</head>
<body>
    <h1>アカウント作成</h1>
    <input type="text" id="username" placeholder="ユーザー名">
    <input type="password" id="password" placeholder="パスワード">
    <button onclick="register()">登録</button>
    <div id="message"></div>
    <div class="link"><a href="/login">ログインはこちら</a></div>

    <script>
        async function register() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const res = await fetch("/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            const msg = document.getElementById("message");
            if (res.ok) {
                msg.className = "success";
                msg.textContent = "登録完了！ログインしてください。";
                setTimeout(() => window.location.href = "/login", 1500);
            } else {
                msg.className = "error";
                msg.textContent = data.error;
            }
        }
    </script>
</body>
</html>
