<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント作成 | Keihi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm px-6">
        <div class="mb-10">
            <h1 class="text-2xl font-bold text-white tracking-tight">Keihi</h1>
            <p class="text-zinc-500 text-sm mt-1">アカウントを作成して始めましょう</p>
        </div>
        <div class="bg-zinc-900 rounded-2xl p-7 border border-zinc-800">
            <h2 class="text-white font-semibold mb-5">アカウント作成</h2>
            <input type="text" id="username" placeholder="ユーザー名" class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg px-4 py-2.5 mb-3 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-500 placeholder-zinc-500">
            <input type="email" id="email" placeholder="メールアドレス" class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg px-4 py-2.5 mb-3 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-500 placeholder-zinc-500">
            <input type="password" id="password" placeholder="パスワード" class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg px-4 py-2.5 mb-4 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-500 placeholder-zinc-500">
            <button onclick="register()" class="w-full bg-white hover:bg-zinc-100 text-zinc-900 py-2.5 rounded-lg font-medium transition text-sm">登録する</button>
            <div id="message" class="text-xs text-center mt-3"></div>
            <div class="border-t border-zinc-800 mt-5 pt-5 text-center text-xs text-zinc-500">
                <a href="/login" class="hover:text-white transition">すでにアカウントをお持ちの方</a>
            </div>
        </div>
    </div>
    <script>
        async function register() {
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const res = await fetch("/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username, email, password})
            });
            const data = await res.json();
            const msg = document.getElementById("message");
            if (res.ok) {
                msg.className = "text-green-400 text-xs text-center mt-3";
                msg.textContent = "登録完了しました";
                setTimeout(() => window.location.href = "/login", 1500);
            } else {
                msg.className = "text-red-400 text-xs text-center mt-3";
                msg.textContent = data.error;
            }
        }
    </script>
</body>
</html>
