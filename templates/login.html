<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 100px auto; padding: 0 20px; }
        h1 { color: #333; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #45a049; }
        .link { text-align: center; margin-top: 15px; }
        .error { color: red; text-align: center; }
    </style>
</head>
<body>
    <h1>ログイン</h1>
    <input type="text" id="username" placeholder="ユーザー名">
    <input type="password" id="password" placeholder="パスワード">
    <button onclick="login()">ログイン</button>
    <div id="error" class="error"></div>
    <div class="link"><a href="/register">アカウントを作成</a></div>
    <div class="link"><a href="/forgot-password">パスワードをお忘れの方</a></div>

    <script>
        async function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const res = await fetch("/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            if (res.ok) {
                window.location.href = "/";
            } else {
                document.getElementById("error").textContent = data.error;
            }
        }
    </script>
</body>
</html>
