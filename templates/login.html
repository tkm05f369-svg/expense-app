<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | Keihi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm px-6">
        <div class="mb-10">
            <h1 class="text-2xl font-bold text-white tracking-tight">Keihi</h1>
            <p class="text-zinc-500 text-sm mt-1">クリエイター・フリーランスの経費管理</p>
        </div>
        <div class="bg-zinc-900 rounded-2xl p-7 border border-zinc-800">
            <h2 class="text-white font-semibold mb-5">ログイン</h2>
            <input type="text" id="username" placeholder="ユーザー名" class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg px-4 py-2.5 mb-3 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-500 placeholder-zinc-500">
            <input type="password" id="password" placeholder="パスワード" class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg px-4 py-2.5 mb-4 text-sm focus:outline-none focus:ring-1 focus:ring-zinc-500 placeholder-zinc-500">
            <button onclick="login()" class="w-full bg-white hover:bg-zinc-100 text-zinc-900 py-2.5 rounded-lg font-medium transition text-sm">ログイン</button>
            <div id="error" class="text-red-400 text-xs text-center mt-3"></div>
            <div class="border-t border-zinc-800 mt-5 pt-5 flex justify-between text-xs text-zinc-500">
                <a href="/register" class="hover:text-white transition">アカウントを作成</a>
                <a href="/forgot-password" class="hover:text-white transition">パスワードを忘れた</a>
            </div>
        </div>
        <div class="text-center mt-5 text-xs text-zinc-700">
            <a href="/terms" class="hover:text-zinc-400 transition">利用規約</a>
            <span class="mx-2">·</span>
            <a href="/privacy" class="hover:text-zinc-400 transition">プライバシーポリシー</a>
        </div>
    </div>
    <script>
        async function login() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const res = await fetch("/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            if (res.ok) {
                window.location.href = "/";
            } else {
                document.getElementById("error").textContent = data.error;
            }
        }
    </script>
</body>
</html>
